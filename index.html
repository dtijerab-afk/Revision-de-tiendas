<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas de Tienda - Megatiendas Regional Barranquilla</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/2.8.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #0b1120;
            --primary-blue: #2a5a8f;
            --accent-blue: #4a9eff;
            --light-blue: #5ab3ff;
            --surface: rgba(26, 48, 80, 0.4);
            --surface-hover: rgba(26, 48, 80, 0.6);
        }

        html, body {
            background: linear-gradient(135deg, #0b1120 0%, #0f172a 50%, #0c1a30 100%);
            color: #f1f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 158, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .glass-card {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1), 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--light-blue) 100%);
            color: white; border: none; border-radius: 8px; padding: 10px 20px;
            font-weight: 700; cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(74, 158, 255, 0.4); }

        .btn-secondary {
            background: transparent; color: var(--light-blue);
            border: 1px solid var(--accent-blue); border-radius: 8px; padding: 8px 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem;
        }
        .btn-secondary:hover { background: rgba(74, 158, 255, 0.1); border-color: var(--light-blue); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2); color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 6px; padding: 6px 12px;
            font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.3s ease;
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); border-color: #fca5a5; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, rgba(26, 48, 80, 0.97) 0%, rgba(15, 23, 42, 0.97) 100%);
            border: 1px solid rgba(74, 158, 255, 0.3); border-radius: 16px; padding: 28px;
            max-width: 700px; width: 95%; max-height: 92vh; overflow-y: auto;
            animation: slideUp 0.4s ease; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: rgba(26, 48, 80, 0.2); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(74, 158, 255, 0.5); border-radius: 10px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 0.9rem; color: var(--light-blue); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 8px; padding: 11px; color: #f1f5f9; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; transition: all 0.3s ease; outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: #64748b; }

        .kanban-column {
            background: rgba(26, 48, 80, 0.3); border: 1px solid rgba(74, 158, 255, 0.15);
            border-radius: 12px; padding: 16px; min-height: 500px; transition: all 0.3s ease;
        }
        .kanban-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(74, 158, 255, 0.2);
        }
        .kanban-header h3 { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .kanban-counter {
            background: linear-gradient(135deg, var(--accent-blue), var(--light-blue));
            color: white; border-radius: 20px; padding: 4px 12px; font-size: 0.85rem; font-weight: 700;
        }

        .visit-card {
            background: var(--surface); border: 1px solid rgba(74, 158, 255, 0.2);
            border-radius: 10px; padding: 14px; margin-bottom: 12px; transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }
        .visit-card:hover { background: var(--surface-hover); border-color: var(--accent-blue); box-shadow: 0 4px 12px rgba(74, 158, 255, 0.2); }
        .visit-title { font-weight: 800; font-size: 1.05rem; margin-bottom: 8px; color: #fff; }
        .visit-meta { font-size: 0.8rem; color: #cbd5e1; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .visit-meta span { background: rgba(74, 158, 255, 0.1); padding: 3px 8px; border-radius: 4px; border-left: 2px solid var(--accent-blue); }
        .visit-summary { font-size: 0.78rem; color: #94a3b8; margin-bottom: 10px; display: flex; gap: 10px; }
        .visit-summary b { color: #fca5a5; }
        .visit-summary .ok { color: #86efac; }
        .visit-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .visit-btn { font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 60px; }

        .estado-select {
            width: 100%; margin-bottom: 8px; padding: 6px; border-radius: 6px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(74, 158, 255, 0.3);
            color: #f1f5f9; font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }

        .aspecto-item {
            background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(74, 158, 255, 0.15);
            border-radius: 10px; padding: 14px; margin-bottom: 12px;
        }
        .aspecto-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .aspecto-nombre { font-weight: 800; font-size: 1rem; color: var(--light-blue); flex: 1; }
        .aspecto-fields { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .aspecto-fields textarea {
            width: 100%; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 8px; padding: 10px; color: #f1f5f9; font-family: 'Inter', sans-serif;
            font-size: 0.9rem; resize: vertical; min-height: 64px; outline: none;
        }
        .aspecto-fields textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1); }
        .aspecto-fields textarea::placeholder { color: #64748b; }
        .aspecto-fecha-wrap { display: flex; align-items: center; gap: 8px; }
        .aspecto-fecha-wrap label { font-size: 0.78rem; color: #94a3b8; font-weight: 600; white-space: nowrap; margin: 0; }
        .aspecto-fecha-wrap input {
            flex: 1; padding: 8px; font-size: 0.85rem; background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(74, 158, 255, 0.3); border-radius: 8px; color: #f1f5f9;
            font-family: 'Inter', sans-serif; outline: none;
        }
        .aspecto-fecha-wrap input:focus { border-color: var(--accent-blue); }

        .notification {
            position: fixed; top: 20px; right: 20px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.95) 0%, rgba(134, 239, 172, 0.2) 100%);
            color: white; padding: 14px 20px; border-radius: 8px; border-left: 4px solid #86efac;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); animation: slideUp 0.3s ease;
            z-index: 2000; font-weight: 600; max-width: 400px;
        }
        .notification.error { background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(252, 165, 165, 0.2) 100%); border-left-color: #fca5a5; }

        @media (max-width: 1024px) { .kanban-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="glass glass-card border-b border-primary-700/30 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 sm:px-6">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center gap-3">
                    <i class="bi bi-shop-window text-2xl text-primary-400"></i>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-primary-300 to-primary-500 bg-clip-text text-transparent">
                            Visitas de Tienda
                        </h1>
                        <p class="text-xs sm:text-sm text-gray-400">
                            Regional Barranquilla | Megatiendas
                            <span id="firebaseStatus" class="ml-2"><i class="bi bi-cloud text-yellow-400"></i> Conectando...</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-2 flex-wrap justify-end">
                    <button class="btn-primary" onclick="window.openVisitModal()">
                        <i class="bi bi-plus-circle"></i> Nueva Visita
                    </button>
                    <div class="dropdown relative">
                        <button class="btn-secondary" id="exportBtn" title="Exportar">
                            <i class="bi bi-download"></i> <span class="hidden sm:inline">Exportar</span>
                        </button>
                        <div class="dropdown-menu hidden absolute right-0 mt-2 w-52 bg-dark-800 border border-primary-700/30 rounded-lg shadow-lg z-50" style="background:#1e293b;">
                            <button class="block w-full text-left px-4 py-2 hover:bg-primary-700/20 text-sm" onclick="window.exportToExcel()">
                                <i class="bi bi-file-earmark-excel"></i> Todas las visitas (Excel)
                            </button>
                            <button class="block w-full text-left px-4 py-2 hover:bg-primary-700/20 text-sm" onclick="window.exportBoardPDF()">
                                <i class="bi bi-file-earmark-pdf"></i> Tablero completo (PDF)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 sm:px-6">
        <div class="kanban-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5" id="tiendasGrid"></div>
    </main>

    <!-- Modal Nueva/Editar Visita -->
    <div class="modal-overlay" id="visitModal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3">
                    <button onclick="window.closeVisitModal()" class="btn-secondary" style="padding:8px 14px;" title="Volver al tablero">
                        <i class="bi bi-arrow-left"></i> Atrás
                    </button>
                    <h2 class="text-xl font-bold text-primary-300" id="modalTitle">Nueva Visita</h2>
                </div>
                <button onclick="window.closeVisitModal()" class="text-gray-400 hover:text-primary-300 transition">
                    <i class="bi bi-x-lg text-xl"></i>
                </button>
            </div>
            <div id="autoSaveIndicator" style="font-size:0.78rem; color:#86efac; font-weight:600; margin-bottom:14px; text-align:right;">
                <i class="bi bi-cloud-check"></i> Guardado automático activo
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div class="form-group">
                    <label for="tienda">Tienda</label>
                    <select id="tienda" onchange="window.autoSaveDraft()" required>
                        <option value="">-- Seleccionar --</option>
                        <option value="Único">Único</option>
                        <option value="Calle 30">Calle 30</option>
                        <option value="Soledad">Soledad</option>
                        <option value="Santo Tomás">Santo Tomás</option>
                        <option value="Nuestro Atlántico">Nuestro Atlántico</option>
                        <option value="Alkarawi">Alkarawi</option>
                        <option value="Boston">Boston</option>
                        <option value="Villa Campestre">Villa Campestre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fechaVisita">Fecha de visita</label>
                    <input type="date" id="fechaVisita" onchange="window.autoSaveDraft()" required>
                </div>
                <div class="form-group">
                    <label for="responsable">Administrador</label>
                    <input type="text" id="responsable" oninput="window.autoSaveDraft()" placeholder="Nombre">
                </div>
            </div>

            <div class="mt-2 mb-3 pb-2 border-b border-primary-700/30">
                <h3 class="text-base font-bold text-light-blue" style="color:var(--light-blue);">
                    <i class="bi bi-clipboard-check"></i> Recorrido por aspectos
                </h3>
                <p class="text-xs text-gray-400 mt-1">Marca ✓ si está OK. Si hay observación, escríbela y pon fecha de solución.</p>
            </div>

            <div id="aspectosContainer"></div>

            <div class="flex gap-3 justify-end mt-6">
                <button type="button" class="btn-secondary" onclick="window.closeVisitModal()">Cancelar</button>
                <button type="button" class="btn-primary" onclick="window.saveVisit()">
                    <i class="bi bi-check-circle"></i> Guardar Visita
                </button>
            </div>
        </div>
    </div>

    <script>
        // ====== ESTADO ======
        const appState = { visits: [], currentEditId: null, db: null, firebaseInitialized: false };

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyD5Y7Vx1wTDYjcFJlH3b8pEQSyhhMPWdEQ",
            authDomain: "mi-agenda-180ab.firebaseapp.com",
            projectId: "mi-agenda-180ab",
            storageBucket: "mi-agenda-180ab.firebasestorage.app",
            messagingSenderId: "323883322724",
            appId: "1:323883322724:web:3063e4b0687e96fb38be71"
        };

        // Los aspectos del recorrido
        const ASPECTOS = [
            'Recorrido Externo',
            'Recorrido Interno (todas las áreas)',
            'Limpieza Piso de Venta',
            'Dinámicas Comerciales',
            'Trastienda',
            'Bodegas',
            'Cavas'
        ];

        // Las 8 tiendas
        const TIENDAS = ['Único', 'Calle 30', 'Soledad', 'Santo Tomás', 'Nuestro Atlántico', 'Alkarawi', 'Boston', 'Villa Campestre'];

        let firestoreUnsubscribe = null;

        // ====== INIT ======
        window.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            setupExportMenu();
            loadVisits();
        });

        function initFirebase() {
            try {
                if (firebase.apps.length === 0) firebase.initializeApp(FIREBASE_CONFIG);
                appState.db = firebase.firestore();
                appState.firebaseInitialized = true;
                setupListener();
            } catch (err) {
                console.error('Firebase error:', err.message);
                appState.firebaseInitialized = false;
                loadFromLocal();
            }
            updateStatus();
        }

        function updateStatus() {
            const el = document.getElementById('firebaseStatus');
            if (!el) return;
            el.innerHTML = appState.firebaseInitialized
                ? '<i class="bi bi-cloud-check text-green-400"></i> <span class="text-green-400 text-xs">Sincronizado</span>'
                : '<i class="bi bi-cloud-slash text-yellow-400"></i> <span class="text-yellow-400 text-xs">LocalStorage</span>';
        }

        function setupListener() {
            if (!appState.firebaseInitialized || !appState.db) return;
            if (firestoreUnsubscribe) firestoreUnsubscribe();
            try {
                firestoreUnsubscribe = appState.db.collection('visitas')
                    .where('region', '==', 'Barranquilla')
                    .onSnapshot(
                        snap => { appState.visits = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderBoard(); updateStatus(); },
                        err => { console.warn('Listener error:', err.message); updateStatus(); }
                    );
            } catch (err) { console.error(err); }
        }

        function setupExportMenu() {
            document.getElementById('exportBtn').addEventListener('click', function() {
                this.nextElementSibling.classList.toggle('hidden');
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dropdown')) document.querySelector('.dropdown-menu').classList.add('hidden');
            });
        }

        // ====== DATOS ======
        function loadVisits() { loadFromLocal(); }
        function loadFromLocal() {
            try {
                const s = localStorage.getItem('megatiendas_visitas');
                appState.visits = s ? JSON.parse(s) : [];
                renderBoard();
            } catch (e) { appState.visits = []; renderBoard(); }
        }
        function saveVisits() {
            localStorage.setItem('megatiendas_visitas', JSON.stringify(appState.visits));
            if (appState.firebaseInitialized) saveToFirestore();
        }
        function saveToFirestore() {
            try {
                const batch = appState.db.batch();
                appState.visits.forEach(v => {
                    const ref = appState.db.collection('visitas').doc(v.id);
                    batch.set(ref, { ...v, region: 'Barranquilla', updatedAt: new Date() }, { merge: true });
                });
                batch.commit().catch(e => console.error('Firestore save error:', e.message));
            } catch (e) { console.error(e); }
        }
        function deleteFromFirestore(id) {
            if (appState.firebaseInitialized && appState.db) {
                appState.db.collection('visitas').doc(id).delete().catch(e => console.error(e));
            }
        }

        // ====== RENDER ======
        function renderBoard() {
            const grid = document.getElementById('tiendasGrid');
            if (!grid) return;
            grid.innerHTML = '';

            // Agrupar visitas por tienda
            const porTienda = {};
            TIENDAS.forEach(t => porTienda[t] = []);
            appState.visits.forEach(v => {
                const t = v.tienda || 'Sin tienda';
                if (!porTienda[t]) porTienda[t] = [];
                porTienda[t].push(v);
            });

            TIENDAS.forEach(tienda => {
                const visitas = (porTienda[tienda] || []).sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
                const col = document.createElement('div');
                col.className = 'kanban-column';

                let html = `<div class="kanban-header">
                    <h3><i class="bi bi-shop"></i> ${tienda.toUpperCase()}</h3>
                    <span class="kanban-counter">${visitas.length}</span>
                </div>`;

                if (visitas.length === 0) {
                    html += `<div style="text-align:center; padding:30px 10px; color:#475569; font-size:0.85rem;">
                        <i class="bi bi-inbox" style="font-size:1.8rem; display:block; margin-bottom:6px; opacity:0.5;"></i>
                        Sin visitas
                    </div>`;
                } else {
                    html += '<div id="col-' + TIENDAS.indexOf(tienda) + '"></div>';
                }

                col.innerHTML = html;
                grid.appendChild(col);

                if (visitas.length > 0) {
                    const inner = col.querySelector('#col-' + TIENDAS.indexOf(tienda));
                    visitas.forEach(v => inner.appendChild(createCard(v)));
                }
            });
        }

        function createCard(v) {
            const card = document.createElement('div');
            card.className = 'visit-card';

            const conObs = (v.aspectos || []).filter(a => a.observacion && a.observacion.trim()).length;

            let html = `<div class="visit-meta">`;
            if (v.fecha) html += `<span><i class="bi bi-calendar"></i> ${v.fecha}</span>`;
            if (v.responsable) html += `<span><i class="bi bi-person"></i> ${escapeHtml(v.responsable)}</span>`;
            html += `</div>`;
            html += `<div class="visit-summary">
                <span><b>${conObs}</b> observación(es)</span>
            </div>`;

            html += `<div class="visit-actions">
                <button class="btn-secondary visit-btn" onclick="window.editVisit('${v.id}')"><i class="bi bi-pencil"></i> Editar</button>
                <button class="btn-primary visit-btn" onclick="window.exportVisitPDF('${v.id}')"><i class="bi bi-file-pdf"></i> PDF</button>
                <button class="btn-danger visit-btn" onclick="window.deleteVisit('${v.id}')"><i class="bi bi-trash"></i></button>
            </div>`;

            card.innerHTML = html;
            return card;
        }

        // ====== MODAL ======
        function openVisitModal() {
            appState.currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Nueva Visita';
            document.getElementById('tienda').value = '';
            document.getElementById('fechaVisita').value = new Date().toISOString().slice(0, 10);
            document.getElementById('responsable').value = '';
            window.__notasTemp = '';
            renderAspectos([]);
            const ind = document.getElementById('autoSaveIndicator');
            if (ind) { ind.innerHTML = '<i class="bi bi-cloud-check"></i> Guardado automático activo'; ind.style.color = '#86efac'; }
            document.getElementById('visitModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeVisitModal() {
            document.getElementById('visitModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            appState.currentEditId = null;
        }

        function renderAspectos(saved) {
            const cont = document.getElementById('aspectosContainer');
            let html = '';
            ASPECTOS.forEach((nombre, i) => {
                const data = saved.find(a => a.nombre === nombre) || {};
                const obs = data.observacion ? escapeHtml(data.observacion) : '';
                html += `
                <div class="aspecto-item">
                    <div class="aspecto-head">
                        <span class="aspecto-nombre"><i class="bi bi-geo-alt"></i> ${nombre}</span>
                    </div>
                    <div class="aspecto-fields">
                        <textarea id="asp_obs_${i}" oninput="window.autoSaveDraft()" placeholder="Observación sobre ${nombre.toLowerCase()}..."></textarea>
                    </div>
                </div>`;
            });
            html += `
                <div class="aspecto-item" style="border-color: rgba(245, 158, 11, 0.3);">
                    <div class="aspecto-head">
                        <span class="aspecto-nombre" style="color:#fbbf24;"><i class="bi bi-journal-text"></i> Notas adicionales</span>
                    </div>
                    <div class="aspecto-fields">
                        <textarea id="notasAdicionales" oninput="window.autoSaveDraft()" placeholder="Observaciones generales, compromisos, comentarios extra...">${window.__notasTemp || ''}</textarea>
                    </div>
                </div>`;
            cont.innerHTML = html;
            // Rellenar las observaciones (evita problemas de comillas en el HTML)
            ASPECTOS.forEach((nombre, i) => {
                const data = saved.find(a => a.nombre === nombre) || {};
                const el = document.getElementById(`asp_obs_${i}`);
                if (el && data.observacion) el.value = data.observacion;
            });
            window.__notasTemp = '';
        }

        // ====== AUTOGUARDADO ======
        // Guarda un borrador cada vez que escribes, sin cerrar el formulario.
        // Si la app se cierra, al reabrir la visita todo sigue ahí.
        let autoSaveTimer = null;
        function autoSaveDraft() {
            // Muestra indicador "guardando..."
            const ind = document.getElementById('autoSaveIndicator');
            if (ind) { ind.textContent = '✍️ Escribiendo...'; ind.style.color = '#fbbf24'; }

            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                doAutoSave();
                if (ind) { ind.textContent = '✓ Guardado automático'; ind.style.color = '#86efac'; }
            }, 800); // guarda 0.8s después de que dejas de escribir
        }

        function doAutoSave() {
            const tienda = document.getElementById('tienda').value;
            if (!tienda) return; // no guarda sin tienda

            const aspectos = ASPECTOS.map((nombre, i) => {
                const obsEl = document.getElementById(`asp_obs_${i}`);
                return {
                    nombre,
                    observacion: obsEl ? obsEl.value.trim() : ''
                };
            });
            const notasEl = document.getElementById('notasAdicionales');

            const visit = {
                id: appState.currentEditId || `visita_${Date.now()}`,
                tienda,
                fecha: document.getElementById('fechaVisita').value,
                responsable: document.getElementById('responsable').value.trim(),
                aspectos,
                notas: notasEl ? notasEl.value.trim() : '',
                createdAt: appState.currentEditId ? undefined : new Date().toISOString()
            };

            // Si era nueva, ahora pasa a tener ID fijo para seguir editándola
            if (!appState.currentEditId) appState.currentEditId = visit.id;

            const idx = appState.visits.findIndex(v => v.id === visit.id);
            if (idx >= 0) appState.visits[idx] = { ...appState.visits[idx], ...visit };
            else appState.visits.push(visit);

            saveVisits();
            renderBoard();
        }

        function saveVisit() {
            const tienda = document.getElementById('tienda').value;
            if (!tienda) { showNotification('Seleccione una tienda', 'error'); return; }

            const aspectos = ASPECTOS.map((nombre, i) => ({
                nombre,
                observacion: document.getElementById(`asp_obs_${i}`).value.trim()
            }));

            const notas = document.getElementById('notasAdicionales').value.trim();

            const visit = {
                id: appState.currentEditId || `visita_${Date.now()}`,
                tienda,
                fecha: document.getElementById('fechaVisita').value,
                responsable: document.getElementById('responsable').value.trim(),
                aspectos,
                notas,
                createdAt: appState.currentEditId ? undefined : new Date().toISOString()
            };

            const idx = appState.visits.findIndex(v => v.id === visit.id);
            if (idx >= 0) appState.visits[idx] = { ...appState.visits[idx], ...visit };
            else appState.visits.push(visit);

            saveVisits();
            renderBoard();
            closeVisitModal();
            showNotification('Visita guardada exitosamente');
        }

        function editVisit(id) {
            const v = appState.visits.find(x => x.id === id);
            if (!v) return;
            appState.currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Editar Visita';
            document.getElementById('tienda').value = v.tienda || '';
            document.getElementById('fechaVisita').value = v.fecha || '';
            document.getElementById('responsable').value = v.responsable || '';
            window.__notasTemp = v.notas || '';
            renderAspectos(v.aspectos || []);
            document.getElementById('visitModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function deleteVisit(id) {
            if (confirm('¿Eliminar esta visita?')) {
                appState.visits = appState.visits.filter(v => v.id !== id);
                deleteFromFirestore(id);
                saveVisits();
                renderBoard();
                showNotification('Visita eliminada');
            }
        }

        // ====== EXPORTAR EXCEL ======
        // ====== EXCEL GENERAL (todas las visitas) ======
        function exportToExcel() {
            try {
                const rows = [];
                appState.visits
                    .sort((a, b) => (a.tienda || '').localeCompare(b.tienda || '') || (b.fecha || '').localeCompare(a.fecha || ''))
                    .forEach(v => {
                        const conObs = (v.aspectos || []).filter(a => a.observacion && a.observacion.trim());
                        if (conObs.length === 0) {
                            rows.push({
                                'Tienda': v.tienda || '', 'Fecha Visita': v.fecha || '',
                                'Administrador': v.responsable || '',
                                'Aspecto': '(Sin observaciones)', 'Observación': '', 'Respuesta Admin': ''
                            });
                        } else {
                            conObs.forEach(a => {
                                rows.push({
                                    'Tienda': v.tienda || '', 'Fecha Visita': v.fecha || '',
                                    'Administrador': v.responsable || '',
                                    'Aspecto': a.nombre, 'Observación': a.observacion || '', 'Respuesta Admin': ''
                                });
                            });
                        }
                        if (v.notas && v.notas.trim()) {
                            rows.push({
                                'Tienda': v.tienda || '', 'Fecha Visita': v.fecha || '',
                                'Administrador': v.responsable || '',
                                'Aspecto': 'NOTAS ADICIONALES', 'Observación': v.notas, 'Respuesta Admin': ''
                            });
                        }
                    });
                if (!rows.length) { showNotification('No hay visitas para exportar', 'error'); return; }
                const ws = XLSX.utils.json_to_sheet(rows);
                ws['!cols'] = [{wch:18},{wch:12},{wch:18},{wch:28},{wch:50},{wch:40}];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
                XLSX.writeFile(wb, `visitas_megatiendas_${new Date().toISOString().slice(0,10)}.xlsx`);
                showNotification('Excel generado');
            } catch (e) { showNotification('Error: ' + e.message, 'error'); }
            document.querySelector('.dropdown-menu').classList.add('hidden');
        }

        // ====== EXPORTAR PDF DE UNA VISITA ======
        function exportVisitPDF(id) {
            const v = appState.visits.find(x => x.id === id);
            if (!v) return;
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageW = doc.internal.pageSize.getWidth();
                const marginX = 14;
                let y = 0;

                // ===== Encabezado =====
                doc.setFillColor(42, 90, 143);
                doc.rect(0, 0, pageW, 30, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(17); doc.setFont(undefined, 'bold');
                doc.text('Informe de Visita a Tienda', marginX, 13);
                doc.setFontSize(10); doc.setFont(undefined, 'normal');
                doc.text('Megatiendas — Regional Barranquilla', marginX, 21);
                doc.setFontSize(9);
                doc.text('Generado: ' + new Date().toLocaleDateString('es-CO'), pageW - marginX, 21, { align: 'right' });

                // ===== Datos generales =====
                y = 38;
                doc.setFillColor(240, 244, 248);
                doc.roundedRect(marginX, y, pageW - marginX * 2, 22, 2, 2, 'F');
                doc.setTextColor(30, 41, 59);
                doc.setFontSize(11); doc.setFont(undefined, 'bold');
                doc.text(`Tienda: ${v.tienda || ''}`, marginX + 4, y + 8);
                doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                doc.text(`Fecha de visita: ${v.fecha || '—'}`, marginX + 4, y + 16);
                doc.text(`Administrador: ${v.responsable || '—'}`, pageW / 2, y + 12);
                y += 30;

                // ===== Tabla de observaciones con espacio de respuesta =====
                const conObs = (v.aspectos || []).filter(a => a.observacion && a.observacion.trim());

                doc.setFontSize(12); doc.setFont(undefined, 'bold');
                doc.setTextColor(42, 90, 143);
                doc.text('Observaciones del recorrido', marginX, y); y += 6;

                if (conObs.length === 0) {
                    doc.setFontSize(10); doc.setFont(undefined, 'italic'); doc.setTextColor(120, 120, 120);
                    doc.text('Sin observaciones registradas en este recorrido.', marginX, y + 4); y += 12;
                } else {
                    const colAsp = marginX;
                    const colObs = marginX + 40;
                    const colResp = marginX + 115;
                    const tableRight = pageW - marginX;
                    y += 2;
                    // Cabecera
                    doc.setFillColor(42, 90, 143);
                    doc.rect(marginX, y, pageW - marginX * 2, 8, 'F');
                    doc.setTextColor(255, 255, 255); doc.setFontSize(9); doc.setFont(undefined, 'bold');
                    doc.text('ASPECTO', colAsp + 2, y + 5.5);
                    doc.text('OBSERVACIÓN (Auditor)', colObs + 2, y + 5.5);
                    doc.text('RESPUESTA DEL ADMIN.', colResp + 2, y + 5.5);
                    y += 8;

                    let alt = false;
                    conObs.forEach(a => {
                        const obsLines = doc.splitTextToSize(a.observacion, colResp - colObs - 4);
                        // altura mínima para que el admin tenga espacio de escribir
                        const rowH = Math.max(obsLines.length * 4.5 + 6, 22);

                        if (y + rowH > 280) { doc.addPage(); y = 18; }

                        if (alt) { doc.setFillColor(245, 248, 252); doc.rect(marginX, y, pageW - marginX * 2, rowH, 'F'); }
                        alt = !alt;

                        // bordes de columnas
                        doc.setDrawColor(210, 220, 232); doc.setLineWidth(0.1);
                        doc.line(colObs, y, colObs, y + rowH);
                        doc.line(colResp, y, colResp, y + rowH);

                        doc.setTextColor(30, 41, 59); doc.setFontSize(9); doc.setFont(undefined, 'bold');
                        const aspLines = doc.splitTextToSize(a.nombre, 36);
                        aspLines.forEach((ln, i) => doc.text(ln, colAsp + 2, y + 5 + i * 4.5));

                        doc.setFont(undefined, 'normal'); doc.setTextColor(60, 60, 60);
                        obsLines.forEach((ln, i) => doc.text(ln, colObs + 2, y + 5 + i * 4.5));

                        // columna de respuesta: líneas tenues para escribir
                        doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.1);
                        for (let ly = y + 8; ly < y + rowH - 2; ly += 6) {
                            doc.line(colResp + 2, ly, tableRight - 2, ly);
                        }

                        doc.setDrawColor(210, 220, 232);
                        doc.line(marginX, y + rowH, pageW - marginX, y + rowH);
                        y += rowH;
                    });
                    y += 6;
                }

                // ===== Notas adicionales =====
                if (v.notas && v.notas.trim()) {
                    if (y > 250) { doc.addPage(); y = 18; }
                    doc.setFontSize(12); doc.setFont(undefined, 'bold'); doc.setTextColor(133, 79, 11);
                    doc.text('Notas adicionales', marginX, y); y += 6;
                    doc.setFillColor(250, 238, 218);
                    const notasLines = doc.splitTextToSize(v.notas, pageW - marginX * 2 - 8);
                    const boxH = notasLines.length * 5 + 8;
                    doc.roundedRect(marginX, y, pageW - marginX * 2, boxH, 2, 2, 'F');
                    doc.setFontSize(9.5); doc.setFont(undefined, 'normal'); doc.setTextColor(60, 50, 30);
                    notasLines.forEach((ln, i) => doc.text(ln, marginX + 4, y + 6 + i * 5));
                    y += boxH + 8;
                }

                // ===== Firma =====
                if (y > 255) { doc.addPage(); y = 18; }
                y += 6;
                doc.setDrawColor(120, 120, 120); doc.setLineWidth(0.2);
                doc.line(marginX, y, marginX + 70, y);
                doc.line(pageW - marginX - 70, y, pageW - marginX, y);
                doc.setFontSize(8.5); doc.setFont(undefined, 'normal'); doc.setTextColor(90, 90, 90);
                doc.text('Auditor / Jefe de Operaciones', marginX, y + 5);
                doc.text('Administrador de tienda', pageW - marginX - 70, y + 5);

                doc.save(`Visita_${(v.tienda || '').replace(/\s+/g,'_')}_${v.fecha || ''}.pdf`);
                showNotification('PDF generado');
            } catch (e) { showNotification('Error PDF: ' + e.message, 'error'); }
        }

        // ====== EXPORTAR TABLERO PDF ======
        async function exportBoardPDF() {
            try {
                const el = document.querySelector('main');
                const canvas = await html2canvas(el, { backgroundColor: '#0b1120', scale: 2, logging: false });
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save(`tablero_visitas_${new Date().toISOString().slice(0,10)}.pdf`);
                showNotification('PDF del tablero generado');
            } catch (e) { showNotification('Error: ' + e.message, 'error'); }
            document.querySelector('.dropdown-menu').classList.add('hidden');
        }

        // ====== UTILIDADES ======
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification' + (type === 'error' ? ' error' : '');
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3500);
        }
        function escapeHtml(t) {
            if (!t) return '';
            const m = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' };
            return String(t).replace(/[&<>"']/g, c => m[c]);
        }

        // ====== EXPONER EN WINDOW ======
        window.openVisitModal = openVisitModal;
        window.closeVisitModal = closeVisitModal;
        window.saveVisit = saveVisit;
        window.editVisit = editVisit;
        window.deleteVisit = deleteVisit;
        window.autoSaveDraft = autoSaveDraft;
        window.exportToExcel = exportToExcel;
        window.exportVisitPDF = exportVisitPDF;
        window.exportBoardPDF = exportBoardPDF;
    </script>
</body>
</html>
